  switch:
    - name: "Kabinet AC Turbo"

      unique_id: beko_kabinet_turbo
      optimistic: true
      command_topic: "beko/kabinet/set/turbo"
      payload_on: "on"
      payload_off: "off"
      availability_topic: "beko/available"

    - name: "Salon AC Turbo"
      unique_id: beko_salon_turbo
      optimistic: true
      command_topic: "beko/salon/set/turbo"
      payload_on: "on"
      payload_off: "off"
      availability_topic: "beko/available"

automation:
  - alias: beko_kabinet_temp
    trigger:
      - platform: state
        entity_id: input_number.beko_kabinet_temp
    action:
      - service: mqtt.publish
        data:
          topic: "beko/kabinet/set/temperature"
          payload: "{{ states('input_number.beko_kabinet_temp') | int }}"

  - alias: beko_salon_temp
    trigger:
      - platform: state
        entity_id: input_number.beko_salon_temp
    action:
      - service: mqtt.publish
        data:
          topic: "beko/salon/set/temperature"
          payload: "{{ states('input_number.beko_salon_temp') | int }}"
