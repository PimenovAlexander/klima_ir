input_number:
  beko_kabinet_temp:
    name: "Kabinet AC Temperature"
    min: 16
    max: 30
    step: 1
    unit_of_measurement: "°C"
    icon: mdi:thermometer
    initial: 22
  beko_salon_temp:
    name: "Salon AC Temperature"
    min: 16
    max: 30
    step: 1
    unit_of_measurement: "°C"
    icon: mdi:thermometer
    initial: 22

mqtt:
