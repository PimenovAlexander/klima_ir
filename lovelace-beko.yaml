              - type: button
                entity: button.kabinet_ac_swing_stop
                name: "Stop"
                icon: mdi:stop
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.kabinet_ac_swing_stop

          - type: horizontal-stack
            cards:
              - type: button
                entity: button.kabinet_ac_display
                name: "Display"
                icon: mdi:monitor
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.kabinet_ac_display
              - type: button
                entity: switch.kabinet_ac_turbo
                name: "Turbo"
                icon: mdi:rocket-launch
                tap_action:
                  action: toggle

