views:
  - title: Clima
    cards:

      # ── Kabinet ──────────────────────────────────────────────────────────────
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Kabinet"

          - type: horizontal-stack
            cards:
              - type: button
                entity: button.kabinet_ac_off
                name: "OFF"
                icon: mdi:power
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.kabinet_ac_off
              - type: button
                entity: button.kabinet_ac_cool
                name: "COOL"
                icon: mdi:snowflake
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.kabinet_ac_cool
              - type: button
                entity: button.kabinet_ac_heat
                name: "HEAT"
                icon: mdi:fire
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.kabinet_ac_heat
              - type: button
                entity: button.kabinet_ac_fan_only
                name: "FAN"
                icon: mdi:fan
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.kabinet_ac_fan_only
              - type: button
                entity: button.kabinet_ac_dehum
                name: "DRY"
                icon: mdi:water-percent
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.kabinet_ac_dehum
              - type: button
                entity: button.kabinet_ac_auto
                name: "AUTO"
                icon: mdi:autorenew
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.kabinet_ac_auto

          - type: entities
            entities:
              - entity: input_number.beko_kabinet_temp
                name: "Температура"

          - type: horizontal-stack
            cards:
              - type: button
                entity: button.kabinet_ac_fan_1
                name: "1"
                icon: mdi:fan-speed-1
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.kabinet_ac_fan_1
              - type: button
                entity: button.kabinet_ac_fan_2
                name: "2"
                icon: mdi:fan-speed-2
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.kabinet_ac_fan_2
              - type: button
                entity: button.kabinet_ac_fan_3
                name: "3"
                icon: mdi:fan-speed-3
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.kabinet_ac_fan_3
              - type: button
                entity: button.kabinet_ac_fan_4
                name: "4"
                icon: mdi:fan
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.kabinet_ac_fan_4
              - type: button
                entity: button.kabinet_ac_fan_5
                name: "5"
                icon: mdi:fan
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.kabinet_ac_fan_5

          - type: horizontal-stack
            cards:
              - type: button
                entity: button.kabinet_ac_swing_pos1
                name: "1"
                icon: mdi:arrow-down
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.kabinet_ac_swing_pos1
              - type: button
                entity: button.kabinet_ac_swing_pos2
                name: "2"
                icon: mdi:arrow-bottom-right
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.kabinet_ac_swing_pos2
              - type: button
                entity: button.kabinet_ac_swing_pos3
                name: "3"
                icon: mdi:arrow-right
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.kabinet_ac_swing_pos3
              - type: button
                entity: button.kabinet_ac_swing_pos4
                name: "4"
                icon: mdi:arrow-top-right
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.kabinet_ac_swing_pos4
              - type: button
                entity: button.kabinet_ac_swing_pos5
                name: "5"
                icon: mdi:arrow-up-right
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.kabinet_ac_swing_pos5
              - type: button
                entity: button.kabinet_ac_swing_pos6
                name: "6"
                icon: mdi:arrow-up
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.kabinet_ac_swing_pos6
              - type: button
                entity: button.kabinet_ac_swing_auto
                name: "Auto"
                icon: mdi:cached
